name: Build and Publish CDN Bundle

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fileworkflow-cdn-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm install

      - name: Build userscript bundle
        run: npm run build

      - name: Prepare CDN files
        run: |
          set -eux
          mkdir -p /tmp/fileworkflow-cdn
          cp dist/fileworkflow-chatgpt-queue.user.js /tmp/fileworkflow-cdn/fileworkflow-chatgpt-queue.user.js
          cp dist/fileworkflow-chatgpt-queue.iife.js /tmp/fileworkflow-cdn/fileworkflow-chatgpt-queue.iife.js
          cd /tmp/fileworkflow-cdn
          zip -9 fileworkflow-chatgpt-queue.user.zip fileworkflow-chatgpt-queue.user.js
          cat > README.md <<'MARKDOWN'
          # FileWorkflow CDN Build

          This branch is generated automatically by GitHub Actions.

          Recommended full userscript:

          ```text
          https://cdn.jsdelivr.net/gh/ActiveInsighter/FileWorkflow@cdn/fileworkflow-chatgpt-queue.user.js
          ```

          Windows-friendly zip download:

          ```text
          https://cdn.jsdelivr.net/gh/ActiveInsighter/FileWorkflow@cdn/fileworkflow-chatgpt-queue.user.zip
          ```

          Legacy IIFE bundle for old loader scripts:

          ```text
          https://cdn.jsdelivr.net/gh/ActiveInsighter/FileWorkflow@cdn/fileworkflow-chatgpt-queue.iife.js
          ```
          MARKDOWN

      - name: Publish to cdn branch
        run: |
          set -eux
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan cdn
          git rm -rf . || true
          cp -R /tmp/fileworkflow-cdn/. .
          git add -A
          git commit -m "chore: publish userscript cdn bundle"
          git push --force origin HEAD:cdn
