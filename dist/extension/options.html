<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>FileWorkflow 设置</title>
    <style>
      body {
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #111827;
        background: #f8fafc;
      }
      h1 {
        margin-bottom: 8px;
      }
      section {
        margin-top: 18px;
        padding: 18px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: white;
      }
      code {
        padding: 2px 5px;
        border-radius: 5px;
        background: #f3f4f6;
      }
      .muted {
        color: #6b7280;
      }

  <body>
    <h1>FileWorkflow 设置</h1>
    <p class="muted">当前扩展版先复用页面悬浮面板，设置页用于后续接 Supabase、任务模板和日志查看。</p>

    <section>
      <h2>使用方式</h2>
      <p>打开 <code>https://chatgpt.com/</code> 后，页面右侧会自动出现 FileWorkflow 队列面板。</p>

    <section>
      <h2>后续计划</h2>
